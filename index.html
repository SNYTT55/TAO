<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="apple-touch-icon" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PARCEL PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --tb-orange: #ff5000;
            --tb-orange-gradient: linear-gradient(135deg, #ff9000, #ff5000);
            --tb-bg: #f5f5f7;
            --tb-card: #ffffff;
            --tb-text: #1d1d1f;
            --tb-text-light: #86868b;
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        
        body { 
            font-family: -apple-system, "SF Pro Text", "PingFang TC", sans-serif; 
            background: var(--tb-bg); margin: 0; color: var(--tb-text); 
            padding-bottom: calc(90px + env(safe-area-inset-bottom));
            line-height: 1.5;
        }

        /* --- Header & Navigation --- */
        header { 
            padding: 20px; background: rgba(255,255,255,0.8); 
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); 
            position: sticky; top: 0; z-index: 100; text-align: center;
        }
        header h1 { font-size: 18px; margin: 0; font-weight: 800; letter-spacing: 1px; }
        header h1 span { color: var(--tb-orange); }

        .tab-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255,255,255,0.9); display: flex; 
            height: 75px; border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000;
            backdrop-filter: blur(20px); padding-bottom: env(safe-area-inset-bottom);
        }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #a1a1a6; transition: 0.2s; cursor: pointer; }
        .tab-item i { font-size: 20px; margin-bottom: 5px; }
        .tab-item span { font-size: 11px; font-weight: 600; }
        .tab-item.active { color: var(--tb-orange); }

        /* --- Page System --- */
        .page { display: none; padding: 16px; animation: slideUp 0.3s ease-out; max-width: 600px; margin: 0 auto; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Global Component Styles --- */
        .card { 
            background: var(--tb-card); border-radius: var(--radius-lg); 
            box-shadow: var(--shadow); margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.02); 
            overflow: hidden; 
        }

        .section-title { font-size: 15px; font-weight: 700; margin: 8px 0 16px 4px; color: var(--tb-text); display: flex; align-items: center; gap: 8px; }

        input, textarea { 
            background: #fbfbfd; border: 1px solid #e5e5ea; border-radius: var(--radius-md); 
            padding: 14px 16px; width: 100%; margin-bottom: 12px; font-size: 16px; 
            transition: 0.2s; appearance: none;
        }
        input:focus, textarea:focus { border-color: var(--tb-orange); background: #fff; box-shadow: 0 0 0 4px rgba(255,80,0,0.08); }

        button { border-radius: 50px; font-weight: 700; border: none; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:active { transform: scale(0.97); opacity: 0.8; }
        button.primary { background: var(--tb-orange-gradient); color: #fff; padding: 16px; width: 100%; font-size: 16px; box-shadow: 0 6px 15px rgba(255,80,0,0.2); }
        button.secondary { background: #f2f2f7; color: var(--tb-text); padding: 12px; font-size: 14px; }

        /* --- List Items --- */
        .shop-header { padding: 16px; display: flex; align-items: center; background: #fff; }
        .shop-name { font-weight: 700; flex: 1; font-size: 16px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
        .tag-category { background: #fff4ef; color: var(--tb-orange); font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600; }
        .tag-pkg-count { background: #f2f2f7; color: #555; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600; }

        .prod-list { background: #fafafa; border-top: 1px solid #f2f2f7; }
        .prod-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f2f2f7; }
        .prod-item:last-child { border-bottom: none; }
        .prod-item span { font-size: 15px; color: #48484a; }
        .prod-item .done { text-decoration: line-through; color: #aeaeb2; }

        .tracking-box { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 10px; background: #fff; border-top: 1px solid #f2f2f7; align-items: center; }
        .id-tag { background: #f2f2f7; border-radius: 10px; padding: 8px 12px; font-size: 13px; color: #3a3a3c; font-weight: 500; cursor: pointer; }
        .id-tag span { color: var(--tb-orange); font-weight: 700; margin-left: 4px; }
        .btn-add-id { border: 1.5px dashed #d1d1d6; background: transparent; color: #8e8e93; border-radius: 10px; padding: 6px 12px; font-size: 13px; cursor: pointer; }

        /* --- Customized Report --- */
        #ship-report { 
            background: linear-gradient(135deg, #070707 0%, #696972 100%); 
            color: #fff; 
            padding: 22px; 
            border-radius: var(--radius-lg); 
            margin-bottom: 20px; 
            position: relative; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        #ship-report::before { display: none; }  
        .report-grid { display: flex; gap: 30px; margin-top: 15px; }
        .report-stat-item { display: flex; flex-direction: column; }
        .report-stat-label { font-size: 11px; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }
        .report-stat-value { font-size: 28px; font-weight: 800; color: #fff; font-family: "DIN Alternate", sans-serif; }
        .report-stat-value small { font-size: 14px; margin-left: 4px; color: var(--tb-orange); }

        /* --- Checkbox Styling --- */
        input[type="checkbox"] {
            appearance: none; width: 22px; height: 22px; border: 2px solid #d1d1d6; 
            border-radius: 6px; position: relative; margin: 0; cursor: pointer; transition: 0.2s;
            background: #fff; flex-shrink: 0;
        }
        input[type="checkbox"]:checked { background: var(--tb-orange); border-color: var(--tb-orange); }
        input[type="checkbox"]:checked::after {
            content: '✓'; color: white; font-size: 14px; font-weight: 900;
            position: absolute; left: 4px; top: -1px;
        }

        /* --- Utilities --- */
        .sticky-action { position: fixed; bottom: 85px; left: 0; right: 0; padding: 0 16px; z-index: 900; pointer-events: none; }
        .sticky-action button { pointer-events: auto; }
        
        #toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px; 
            border-radius: 50px; font-size: 14px; font-weight: 600; z-index: 2000;
            opacity: 0; transition: 0.3s; pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(10px); }

        .history-item { 
            background: #fff; border-radius: var(--radius-md); padding: 14px 18px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .history-date { font-size: 13px; color: var(--tb-text-light); }
        .history-data { font-weight: 700; font-size: 15px; }
        .history-data b { color: var(--tb-orange); font-size: 18px; }
    </style>
</head>

<body>
<header><h1>PARCEL <span>PRO</span></h1></header>

<div id="page-add" class="page active">
    <div class="section-title"><i class="fas fa-plus-circle" style="color:var(--tb-orange)"></i> 新增採購</div>
    <div class="card" style="padding: 16px;">
        <div style="display: grid; grid-template-columns: 1fr 0.8fr 1fr 1.5fr; gap: 6px; margin-bottom: 8px; padding: 0 2px;">
            <span style="font-size: 11px; color: var(--tb-text-light); font-weight: 700;">商家名稱</span>
            <span style="font-size: 11px; color: var(--tb-text-light); font-weight: 700;">分類</span>
            <span style="font-size: 11px; color: var(--tb-text-light); font-weight: 700;">預計包數</span>
            <span style="font-size: 11px; color: var(--tb-text-light); font-weight: 700;">品項 (用,隔開)</span>
        </div>
        
        <div id="quick-input-rows">
            <div class="input-row" style="display: grid; grid-template-columns: 1fr 0.8fr 1fr 1.5fr; gap: 6px; margin-bottom: 12px;">
                <input type="text" class="q-shop" placeholder="例: 淘寶A店" style="margin-bottom:0; font-size:12px; padding:8px; border-radius:8px;">
                <input type="text" class="q-cat" placeholder="家居" style="margin-bottom:0; font-size:12px; padding:8px; border-radius:8px;">
                <input type="number" class="q-pkg-count" min="1" max="20" value="1" style="margin-bottom:0; font-size:12px; padding:8px; border-radius:8px;">
                <input type="text" class="q-items" placeholder="地墊, 掛勾" style="margin-bottom:0; font-size:12px; padding:8px; border-radius:8px;" oninput="checkNewRow(this)">
            </div>
        </div>
        
        <button class="primary" onclick="batchAddFromRows()" style="margin-top: 10px;">
            <i class="fas fa-cloud-upload-alt"></i> 同步至待出貨
        </button>
    </div>
</div>

<div id="page-shipping" class="page">
    <div class="section-title"><i class="fas fa-truck-loading" style="color:var(--tb-orange)"></i> 待出貨清單</div>
    <div class="card" style="padding: 16px; background: #fff4ef; border: 1px dashed var(--tb-orange);">
        <div style="font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--tb-orange);">智慧配對</div>
        <textarea id="raw" rows="2" style="margin-bottom:0; font-size: 13px;" placeholder="貼上物流訊息..." oninput="autoMatch()"></textarea>
        <div id="detected-ids" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;"></div>
    </div>
    <div id="list-shipping"></div>
    <div class="sticky-action">
        <button class="primary" onclick="executeOutbound()">執行出貨</button>
    </div>
</div>

<div id="page-unbox" class="page">
    <div id="ship-report" style="display:none;"></div>
    <div id="list-unboxing"></div>
    <div id="clean-card" style="display:none; margin-top: 20px;">
        <button onclick="cleanAndSync()" class="primary" style="background: #1c1c1e; box-shadow: 0 8px 20px rgba(0,0,0,0.15);">
            <i class="fas fa-check-double"></i> 點收完畢並歸檔
        </button>
    </div>
</div>

<div id="page-setting" class="page">
    <div class="section-title"><i class="fas fa-history" style="color:var(--tb-orange)"></i> 點收歷史紀錄</div>
    <div id="history-log"></div>

    <div class="section-title" style="margin-top:30px;"><i class="fas fa-cog"></i> 系統維護</div>
    <div class="card" style="padding: 20px;">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
            <button class="secondary" onclick="exportData()"><i class="fas fa-copy"></i> 備份數據</button>
            <button class="secondary" onclick="importData()"><i class="fas fa-file-import"></i> 還原數據</button>
        </div>
        <button onclick="clearAll()" style="color:#ff4d4f; background:none; width:100%; margin-top:20px; font-size:13px; font-weight:700;">
            <i class="fas fa-trash-alt"></i> 清空所有本地資料
        </button>
    </div>
</div>

<nav class="tab-bar">
    <div class="tab-item active" onclick="switchPage('page-add')"><i class="fas fa-plus-square"></i><span>新增</span></div>
    <div class="tab-item" onclick="switchPage('page-shipping')"><i class="fas fa-box"></i><span>待出貨</span></div>
    <div class="tab-item" onclick="switchPage('page-unbox')"><i class="fas fa-clipboard-check"></i><span>點收</span></div>
    <div class="tab-item" onclick="switchPage('page-setting')"><i class="fas fa-user-cog"></i><span>系統</span></div>
</nav>

<div id="toast"></div>

<script>
    const STORAGE_KEY = 'tb_pro_mobile_v3';
    let storage = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let historyLog = JSON.parse(localStorage.getItem(STORAGE_KEY + '_hist')) || [];

    // 自動升級修復舊版缺乏 packageCount 的舊資料
    storage.forEach(item => {
        if (!item.packageCount) item.packageCount = item.ids ? item.ids.length : 1;
    });

    // 初始化載入畫面
    document.addEventListener('DOMContentLoaded', () => {
        saveAndRender();
    });

    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if (window.event && window.event.currentTarget) {
            window.event.currentTarget.classList.add('active');
        }
        window.scrollTo({ top: 0, behavior: 'instant' });
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.className = 'show';
        setTimeout(() => { toast.className = ''; }, 2000);
    }

    function saveAndRender() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(storage));
        localStorage.setItem(STORAGE_KEY + '_hist', JSON.stringify(historyLog));
        
        const shipList = document.getElementById('list-shipping');
        const unboxList = document.getElementById('list-unboxing');
        const historyDiv = document.getElementById('history-log');
        const cleanCard = document.getElementById('clean-card');
        const report = document.getElementById('ship-report');

        shipList.innerHTML = ''; unboxList.innerHTML = '';
        let unboxCats = [], unboxW = 0, unboxPkg = 0, hasUnbox = false;

        // 1. 自動排序：尚未到齊的排上方，完成 (例如 4/4 包) 的自動往下排
        const sortedStorageWithIndex = storage.map((order, originalIdx) => ({ order, originalIdx }));
        sortedStorageWithIndex.sort((a, b) => {
            if (a.order.status === 'shipping' && b.order.status === 'shipping') {
                const aFilled = a.order.ids.filter(i => (i.w || 0) > 0).length;
                const aTotal = a.order.packageCount || Math.max(a.order.ids.length, 1);
                const aComplete = aFilled >= aTotal ? 1 : 0;

                const bFilled = b.order.ids.filter(i => (i.w || 0) > 0).length;
                const bTotal = b.order.packageCount || Math.max(b.order.ids.length, 1);
                const bComplete = bFilled >= bTotal ? 1 : 0;

                return aComplete - bComplete;
            }
            return 0;
        });

        // 2. 渲染卡片
        sortedStorageWithIndex.forEach(({ order, originalIdx: oIdx }) => {
            const isUnbox = order.status === 'unboxing';
            const filledIdsCount = order.ids.filter(i => (i.w || 0) > 0).length; // 只算有重量的
            const pkgTotal = order.packageCount || Math.max(order.ids.length, 1);

            // 判斷是否全數到齊 (例如 4/4 包)
            const isComplete = !isUnbox && (filledIdsCount >= pkgTotal) && pkgTotal > 0;

            // 僅對「標籤」進行綠色樣式切換，卡片保持預設
            const tagStyle = isComplete ? 'background: #d1fae5; color: #059669; font-weight: 700;' : '';

            const html = `
                <div class="card">
                    <div class="shop-header">
                        ${!isUnbox ? `<input type="checkbox" ${order.ready ? 'checked' : ''} onclick="toggleReady(${oIdx})">` : ''}
                        <span class="shop-name" style="${!isUnbox ? 'margin-left:12px;' : ''}">
                            ${order.shop}
                            ${order.category ? `<span class="tag-category">${order.category}</span>` : ''}
                            <span class="tag-pkg-count" style="${tagStyle}">${filledIdsCount}/${pkgTotal} 包 ${isComplete ? '✓' : ''}</span>
                        </span>
                        <i class="fas fa-times" style="color:#d1d1d6; padding: 5px; cursor:pointer;" onclick="delOrder(${oIdx})"></i>
                    </div>
                    <div class="prod-list">${order.items.map((it, iIdx) => `
                        <div class="prod-item">
                            ${isUnbox ? `<input type="checkbox" ${it.done ? 'checked' : ''} onclick="toggleDone(${oIdx}, ${iIdx})">` : ''}
                            <span class="${it.done ? 'done' : ''}">${it.name}</span>
                        </div>`).join('')}
                    </div>
                    ${!isUnbox ? `<div class="tracking-box">
                        ${order.ids.map((idObj, idIdx) => `
                            <div class="id-tag" onclick="editAllTracking(${oIdx})">
                            📦 ${idObj.code || '未填單號'} ${idObj.w ? `<span>${idObj.w.toFixed(2)}kg</span>` : ''}
                            </div>`).join('')}
                        <button class="btn-add-id" onclick="editAllTracking(${oIdx})"><i class="fas fa-edit"></i> 編輯</button>
                    </div>` : ''}
                </div>`;
            
            if (isUnbox) { 
                unboxList.innerHTML += html; hasUnbox = true; 
                unboxW += order.ids.reduce((sum, id) => sum + (id.w || 0), 0);
                unboxPkg += order.ids.filter(id => id.w > 0).length;
                if(order.category) unboxCats.push(order.category);
            } else { shipList.innerHTML += html; }
        });

        if (hasUnbox && unboxPkg > 0) {
            report.innerHTML = `
                <div style="font-size: 13px; font-weight: 700; color: #8e8e93;">摘要</div>
                <div class="report-grid">
                    <div class="report-stat-item">
                        <span class="report-stat-label">包裹件數</span>
                        <span class="report-stat-value">${unboxPkg}<small>件</small></span>
                    </div>
                    <div class="report-stat-item">
                        <span class="report-stat-label">總重量</span>
                        <span class="report-stat-value">${unboxW.toFixed(2)}<small>kg</small></span>
                    </div>
                </div>
                <div style="margin-top: 15px; font-size: 12px; color: #636366; border-top: 1px solid #3a3a3c; padding-top: 10px;">
                    <i class="fas fa-tags"></i> ${[...new Set(unboxCats)].join(' · ') || '一般貨件'}
                </div>
            `;
            report.style.display = 'block'; 
            report.dataset.pkg = unboxPkg; 
            report.dataset.w = unboxW.toFixed(2);
        } else { report.style.display = 'none'; }
        
        cleanCard.style.display = hasUnbox ? 'block' : 'none';
        historyDiv.innerHTML = historyLog.length ? historyLog.map(log => `
            <div class="history-item">
                <span class="history-date">${log.date}</span>
                <span class="history-data"><b>${log.pkg}</b> 件 / <b>${log.w}</b> kg</span>
            </div>`).reverse().join('') : '<div style="text-align:center; color:#aeaeb2; padding:40px 0; font-size:14px;">目前沒有歷史紀錄</div>';
    }

    /* --- 新增與輸入處理 --- */
    function checkNewRow(input) {
        const rows = document.getElementById('quick-input-rows');
        const lastRow = rows.lastElementChild;
        if (input.parentElement === lastRow && input.value.trim() !== '') {
            const newRow = document.createElement('div');
            newRow.className = 'input-row';
            newRow.style.cssText = 'display: grid; grid-template-columns: 1fr 0.8fr 1fr 1.5fr; gap: 6px; margin-bottom: 12px;';
            newRow.innerHTML = `
                <input type="text" class="q-shop" placeholder="例: 淘寶A店" style="margin-bottom:0; font-size:12px; padding:8px; border-radius:8px;">
                <input type="text" class="q-cat" placeholder="家居" style="margin-bottom:0; font-size:12px; padding:8px; border-radius:8px;">
                <input type="number" class="q-pkg-count" min="1" max="20" value="1" style="margin-bottom:0; font-size:12px; padding:8px; border-radius:8px;">
                <input type="text" class="q-items" placeholder="地墊, 掛勾" style="margin-bottom:0; font-size:12px; padding:8px; border-radius:8px;" oninput="checkNewRow(this)">
            `;
            rows.appendChild(newRow);
        }
    }

    function batchAddFromRows() {
        const rows = document.querySelectorAll('#quick-input-rows .input-row');
        let addedCount = 0;

        rows.forEach(row => {
            const shop = row.querySelector('.q-shop').value.trim();
            const cat = row.querySelector('.q-cat').value.trim();
            const pkgCount = parseInt(row.querySelector('.q-pkg-count').value) || 1;
            const itemsRaw = row.querySelector('.q-items').value.trim();

            if (shop && itemsRaw) {
                const itemList = itemsRaw.split(/[,，]/).map(s => s.trim()).filter(Boolean).map(name => ({ name, done: false }));
                
                // 初始化與預計包裹數量等長的 ids 陣列
                const ids = Array.from({ length: pkgCount }, () => ({ code: '', w: 0 }));

                storage.push({
                    shop,
                    category: cat,
                    packageCount: pkgCount,
                    items: itemList,
                    ids,
                    status: 'shipping',
                    ready: false
                });
                addedCount++;
            }
        });

        if (addedCount > 0) {
            // 重置輸入區域
            document.getElementById('quick-input-rows').innerHTML = `
                <div class="input-row" style="display: grid; grid-template-columns: 1fr 0.8fr 1fr 1.5fr; gap: 6px; margin-bottom: 12px;">
                    <input type="text" class="q-shop" placeholder="例: 淘寶A店" style="margin-bottom:0; font-size:12px; padding:8px; border-radius:8px;">
                    <input type="text" class="q-cat" placeholder="家居" style="margin-bottom:0; font-size:12px; padding:8px; border-radius:8px;">
                    <input type="number" class="q-pkg-count" min="1" max="20" value="1" style="margin-bottom:0; font-size:12px; padding:8px; border-radius:8px;">
                    <input type="text" class="q-items" placeholder="地墊, 掛勾" style="margin-bottom:0; font-size:12px; padding:8px; border-radius:8px;" oninput="checkNewRow(this)">
                </div>
            `;
            saveAndRender();
            showToast(`✅ 已新增 ${addedCount} 筆訂單`);
            switchPage('page-shipping');
        } else {
            Swal.fire({ icon: 'warning', title: '請填寫店家與品項', confirmButtonColor: '#ff5000' });
        }
    }

    /* --- 智慧配對與出貨 --- */
    /* --- 智慧配對與輸入框自動清理 --- */
    function autoMatch() {
        const rawInput = document.getElementById('raw');
        const container = document.getElementById('detected-ids');
        const text = rawInput.value.trim();
        
        if (!text) {
            container.innerHTML = '';
            return;
        }

        const idR = /[A-Z0-9]{8,25}/i;
        const wR = /(\d+(?:\.\d+)?)\s*(?:KG|kg|公斤)/i; 

        const lines = text.split('\n');
        let newLines = [...lines]; // 用來追蹤剩下的未處理文字
        const detectedData = [];
        let autoMatchedCount = 0;
        let autoRemovedCount = 0;

        lines.forEach((line) => {
            const iMatch = line.match(idR);
            const wMatch = line.match(wR);
            
            if (iMatch) {
                const id = iMatch[0].toUpperCase();
                const weight = wMatch ? parseFloat(wMatch[1]) : 0;

                let found = false;
                let weightUpdated = false;

                // 檢查單號是否已存在於待出貨清單
                storage.forEach(order => {
                    if (order.status === 'shipping') {
                        order.ids.forEach(idObj => {
                            if (idObj.code && idObj.code.toUpperCase() === id) {
                                found = true;
                                // 若原本沒重量，這次有帶重量，則補齊重量
                                if ((!idObj.w || idObj.w === 0) && weight > 0) {
                                    idObj.w = weight;
                                    weightUpdated = true;
                                }
                            }
                        });
                    }
                });

                // 只要這筆單號已經記錄過：
                if (found) {
                    // 自動從輸入框刪除該行訊息
                    newLines = newLines.filter(l => !l.toUpperCase().includes(id));
                    if (weightUpdated) autoMatchedCount++;
                    else autoRemovedCount++;
                } else {
                    // 完全陌生的單號，加入待分配清單（產生按鈕）
                    // 避免重複放入同一個單號按鈕
                    if (!detectedData.some(d => d.id === id)) {
                        detectedData.push({ id, weight });
                    }
                }
            }
        });

        // 如果有更新資料或自動過濾已存在單號，更新輸入框內容並儲存
        if (autoMatchedCount > 0 || autoRemovedCount > 0) {
            rawInput.value = newLines.join('\n').trim();
            saveAndRender();
            if (autoMatchedCount > 0) {
                showToast(`✨ 自動補齊 ${autoMatchedCount} 筆包裹重量`);
            }
        }

         // 渲染剩下的陌生單號按鈕或完成提示
        if (detectedData.length === 0) {
            // 只要原文字框不為空，或者剛剛有自動過濾/補齊過單號，就顯示完成提示
            if (text !== "" || autoMatchedCount > 0 || autoRemovedCount > 0) {
                container.innerHTML = `<div style="color:var(--tb-text-light); font-size:12px; padding:6px 0;">✨ 偵測單號皆已處理</div>`;
            } else {
                container.innerHTML = '';
            }
        } else {
            container.innerHTML = detectedData.map(data => {
                const shortId = data.id.length > 8 ? `...${data.id.slice(-6)}` : data.id;
                return `
                    <button class="secondary" 
                        style="background:var(--tb-orange-gradient); color:white; padding:8px 14px; border-radius:10px; font-size:12px; border:none; box-shadow:var(--shadow);" 
                        onclick="matchIdToOrder('${data.id}', ${data.weight})">
                        <i class="fas fa-box"></i> ${shortId}
                        <span style="display:block; font-size:10px; opacity:0.9;">${data.weight > 0 ? data.weight + ' kg' : '無重量'}</span>
                    </button>
                `;
            }).join('');
        }
    }

    async function matchIdToOrder(id, weight) {
        // 取得尚未出貨的訂單
        const pendingOrders = storage.filter(o => o.status === 'shipping');
        
        if (pendingOrders.length === 0) {
            return Swal.fire('提示', '目前沒有待出貨的訂單可分配', 'info');
        }

        // 建立下拉選單選項
        const inputOptions = {};
        pendingOrders.forEach((o, idx) => {
            const filledPkg = o.ids.filter(i => i.code !== '').length;
            const totalPkg = o.packageCount || 1;
            inputOptions[idx] = `[${o.shop}] ${o.items.map(i => i.name).join(', ')} (${filledPkg}/${totalPkg}包)`;
        });

        const { value: orderIdx } = await Swal.fire({
            title: '確認配對資訊',
            html: `
                <div style="text-align:left; background:#f4f4f4; padding:12px; border-radius:10px; margin-bottom:12px; font-size:13px;">
                    <div>單號：<b style="color:var(--tb-orange)">${id}</b></div>
                    <div>重量：<b style="color:var(--tb-orange)">${weight > 0 ? weight + ' kg' : '未秤重'}</b></div>
                </div>
                請選擇要分配的店家項目：`,
            input: 'select',
            inputOptions: inputOptions,
            inputPlaceholder: '--- 請選擇店家 ---',
            showCancelButton: true,
            confirmButtonColor: '#ff5000',
            confirmButtonText: '確認分配',
            cancelButtonText: '取消'
        });

        if (orderIdx !== undefined && orderIdx !== "") {
            const target = pendingOrders[orderIdx];
            
            // 尋找空欄位填入，或是動態追加
            let emptySlot = target.ids.find(i => !i.code);
            if (emptySlot) {
                emptySlot.code = id;
                emptySlot.w = weight;
            } else {
                target.ids.push({ code: id, w: weight });
            }
            
            // 自動更新預計包裹數（若實際填入的多於原預計數）
            if (target.ids.length > target.packageCount) {
                target.packageCount = target.ids.length;
            }

            // 從輸入框中刪除已配對的單號行
            const rawInput = document.getElementById('raw');
            const lines = rawInput.value.split('\n');
            const filteredLines = lines.filter(line => !line.toUpperCase().includes(id.toUpperCase()));
            rawInput.value = filteredLines.join('\n').trim();

            // 儲存並重新渲染
            saveAndRender();
            autoMatch(); 

            showToast(`✅ ${id} 已完成分配`);
        }
    }

    function toggleReady(idx) { storage[idx].ready = !storage[idx].ready; saveAndRender(); }
    function toggleDone(oIdx, iIdx) { storage[oIdx].items[iIdx].done = !storage[oIdx].items[iIdx].done; saveAndRender(); }
    function delOrder(idx) {
        Swal.fire({
            title: '確定刪除？',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff5000',
            confirmButtonText: '確定',
            cancelButtonText: '取消'
        }).then((result) => { if (result.isConfirmed) { storage.splice(idx, 1); saveAndRender(); showToast("🗑️ 已刪除"); } });
    }

    function executeOutbound() {
        const readyOrders = storage.filter(o => o.status === 'shipping' && o.ready);
        if (readyOrders.length === 0) {
            Swal.fire({ title: '請先勾選要出貨的訂單', icon: 'info', confirmButtonColor: '#ff5000' });
            return;
        }

        Swal.fire({
            title: '確認執行出貨？',
            text: `將選取的 ${readyOrders.length} 筆訂單移至點收頁面`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#ff5000',
            confirmButtonText: '確定出貨',
            cancelButtonText: '取消'
        }).then((res) => {
            if (res.isConfirmed) {
                storage.forEach(o => {
                    if (o.status === 'shipping' && o.ready) {
                        o.status = 'unboxing';
                        o.ready = false;
                    }
                });
                saveAndRender();
                showToast("🚀 已移至點收區");
                switchPage('page-unbox');
            }
        });
    }

    function cleanAndSync() {
        const report = document.getElementById('ship-report');
        const pkg = report.dataset.pkg || 0;
        const w = report.dataset.w || 0;

        Swal.fire({
            title: '確認點收完畢？',
            text: `將歸檔本次 ${pkg} 件 / ${w} kg 包裹紀錄，並清空點收區`,
            icon: 'success',
            showCancelButton: true,
            confirmButtonColor: '#ff5000',
            confirmButtonText: '歸檔並清空',
            cancelButtonText: '取消'
        }).then((res) => {
            if (res.isConfirmed) {
                const now = new Date();
                const dateStr = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                
                historyLog.push({ date: dateStr, pkg, w });
                storage = storage.filter(o => o.status !== 'unboxing');
                
                saveAndRender();
                showToast("📦 已成功歸檔紀錄");
            }
        });
    }

    /* --- 資料備份與還原 --- */
   /* --- 相容新舊格式的備份與還原 --- */
    function exportData() {
        // 採用 Base64 編碼（縮短字串且保護格式不破版）
        const dataStr = JSON.stringify({ s: storage, h: historyLog });
        const code = btoa(unescape(encodeURIComponent(dataStr)));
        
        // 使用舊版相容性最好的複製方式
        const t = document.createElement("textarea"); 
        document.body.appendChild(t); 
        t.value = code; 
        t.select();
        document.execCommand("copy"); 
        document.body.removeChild(t);

        Swal.fire({ 
            title: '備份已複製', 
            text: '備份碼已複製至剪貼簿，請妥善保存', 
            icon: 'success', 
            confirmButtonColor: '#ff5000' 
        });
    }

    function importData() {
        Swal.fire({
            title: '還原數據',
            input: 'textarea',
            inputPlaceholder: '貼上備份碼或 JSON 字串...',
            showCancelButton: true,
            confirmButtonColor: '#ff5000',
            confirmButtonText: '還原',
            cancelButtonText: '取消'
        }).then((res) => {
            if (res.isConfirmed && res.value) {
                const rawVal = res.value.trim();
                let parsed = null;

                // 1. 嘗試以舊版 Base64 解碼
                try {
                    const decodedStr = decodeURIComponent(escape(atob(rawVal)));
                    parsed = JSON.parse(decodedStr);
                } catch (e) {
                    // 2. 解碼失敗則嘗試以新版明文 JSON 直接解析
                    try {
                        parsed = JSON.parse(rawVal);
                    } catch (err) {
                        parsed = null;
                    }
                }

                // 3. 自動相容 s/h 縮寫與 storage/historyLog 全名
                if (parsed) {
                    if (parsed.s && Array.isArray(parsed.s)) {
                        // 相容舊版 (s, h)
                        storage = parsed.s;
                        historyLog = parsed.h || [];
                    } else if (parsed.storage) {
                        // 相容新版 (storage, historyLog)
                        storage = parsed.storage;
                        historyLog = parsed.historyLog || [];
                    } else if (Array.isArray(parsed)) {
                        // 相容純陣列格式
                        storage = parsed;
                    }

                    saveAndRender();
                    showToast("✨ 資料已成功還原");
                } else {
                    Swal.fire({ title: '格式錯誤', text: '無效的備份碼或資料格式', icon: 'error', confirmButtonColor: '#ff5000' });
                }
            }
        });
    }

    function clearAll() {
        Swal.fire({
            title: '警告：清空所有資料？',
            text: '此操作將刪除所有待出貨、點收與歷史紀錄，且無法復原！',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4f',
            confirmButtonText: '確定全部清空',
            cancelButtonText: '取消'
        }).then((res) => {
            if (res.isConfirmed) {
                storage = [];
                historyLog = [];
                localStorage.removeItem(STORAGE_KEY);
                localStorage.removeItem(STORAGE_KEY + '_hist');
                saveAndRender();
                showToast("🗑️ 已清空所有資料");
            }
        });
    }

    /* --- 單號重複防呆與動態拆包整合邏輯 --- */
    function checkTrackingDuplicate(trackingNo, currentOrderIdx, currentInputEl) {
        if (!trackingNo || !trackingNo.trim()) return { duplicate: false };
        const cleanNo = trackingNo.trim().toUpperCase();

        // 1. 比對資料庫中其他品項的單號
        for (let i = 0; i < storage.length; i++) {
            if (i === currentOrderIdx) continue; // 跳過自身品項
            const item = storage[i];
            if (Array.isArray(item.ids)) {
                for (let idObj of item.ids) {
                    if (idObj.code && idObj.code.trim().toUpperCase() === cleanNo) {
                        return { duplicate: true, source: item.shop || '其他店家' };
                    }
                }
            }
        }

        // 2. 比對目前彈窗中其他輸入框
        const allModalInputs = document.querySelectorAll('.swal-tracking-input');
        let dupCount = 0;
        allModalInputs.forEach(input => {
            if (input.value.trim().toUpperCase() === cleanNo) {
                dupCount++;
            }
        });

        if (dupCount > 1) {
            return { duplicate: true, source: '此商品的其他包裹欄位' };
        }

        return { duplicate: false };
    }

    window.validateModalInput = function(inputEl, oIdx) {
        const val = inputEl.value.trim();
        const errEl = inputEl.parentElement.querySelector('.swal-input-error');
        
        if (!val) {
            inputEl.style.borderColor = '#e5e5ea';
            if (errEl) errEl.style.display = 'none';
            return true;
        }

        const res = checkTrackingDuplicate(val, oIdx, inputEl);
        if (res.duplicate) {
            inputEl.style.borderColor = '#e74c3c';
            if (errEl) {
                errEl.innerText = `⚠️ 已存在於：「${res.source}」`;
                errEl.style.display = 'block';
            }
            return false;
        } else {
            inputEl.style.borderColor = '#2ecc71';
            if (errEl) errEl.style.display = 'none';
            return true;
        }
    };

    window.updateModalTrackingFields = function(oIdx) {
        const pkgCountInput = document.getElementById('swal-pkg-count');
        let newCount = parseInt(pkgCountInput.value) || 1;
        if (newCount < 1) newCount = 1;

        const container = document.getElementById('swal-tracking-container');
        const currentInputs = container.querySelectorAll('.swal-tracking-input');

        // 檢查如果縮減數量且末尾有資料，提示確認
        if (currentInputs.length > newCount) {
            let hasExcess = false;
            for (let i = newCount; i < currentInputs.length; i++) {
                if (currentInputs[i].value.trim() !== '') {
                    hasExcess = true;
                    break;
                }
            }
            if (hasExcess) {
                if (!confirm(`縮減包裹數量至 ${newCount} 個，將會抹除後方已填寫的單號，確定要改嗎？`)) {
                    pkgCountInput.value = currentInputs.length;
                    return;
                }
            }
        }

        // 收集目前輸入值
        const existingVals = [];
        currentInputs.forEach((inp, idx) => {
            if (idx < newCount) existingVals.push(inp.value);
        });

        // 重新渲染
        container.innerHTML = '';
        for (let i = 0; i < newCount; i++) {
            const val = existingVals[i] || '';
            const field = document.createElement('div');
            field.style.marginBottom = '8px';
            field.style.textAlign = 'left';
            field.innerHTML = `
                <div style="font-size:11px; color:#666; margin-bottom:2px;">包裹 #${i + 1}</div>
                <input type="text" class="swal-tracking-input" value="${val}" placeholder="輸入單號" 
                       style="margin-bottom:2px; padding:8px 12px; font-size:13px;"
                       oninput="window.validateModalInput(this, ${oIdx})">
                <div class="swal-input-error" style="color:#e74c3c; font-size:11px; display:none;"></div>
            `;
            container.appendChild(field);
            
            if (val) {
                const inp = field.querySelector('.swal-tracking-input');
                window.validateModalInput(inp, oIdx);
            }
        }
    };

    function editAllTracking(oIdx) {
        const order = storage[oIdx];
        const pkgCount = order.packageCount || Math.max(order.ids.length, 1);

        let fieldsHtml = '';
        for (let i = 0; i < pkgCount; i++) {
            const code = (order.ids[i] && order.ids[i].code) ? order.ids[i].code : '';
            fieldsHtml += `
                <div style="margin-bottom:8px; text-align:left;">
                    <div style="font-size:11px; color:#666; margin-bottom:2px;">包裹 #${i + 1}</div>
                    <input type="text" class="swal-tracking-input" value="${code}" placeholder="輸入單號" 
                           style="margin-bottom:2px; padding:8px 12px; font-size:13px;"
                           oninput="window.validateModalInput(this, ${oIdx})">
                    <div class="swal-input-error" style="color:#e74c3c; font-size:11px; display:none;"></div>
                </div>
            `;
        }

        Swal.fire({
            title: `管理單號與拆包 [${order.shop}]`,
            html: `
                <div style="margin-bottom: 12px; text-align: left;">
                    <label style="font-size: 12px; font-weight:700; color:#333;">預計包裹總數 (動態拆包)</label>
                    <input type="number" id="swal-pkg-count" min="1" max="20" value="${pkgCount}" 
                           style="margin-top:4px; margin-bottom:8px; padding:8px; font-size:14px;"
                           onchange="window.updateModalTrackingFields(${oIdx})">
                </div>
                <div id="swal-tracking-container">
                    ${fieldsHtml}
                </div>
            `,
            showCancelButton: true,
            confirmButtonColor: '#ff5000',
            confirmButtonText: '儲存變更',
            cancelButtonText: '取消',
            didOpen: () => {
                const modalInputs = document.querySelectorAll('.swal-tracking-input');
                modalInputs.forEach(inp => window.validateModalInput(inp, oIdx));
            },
            preConfirm: () => {
                const modalInputs = document.querySelectorAll('.swal-tracking-input');
                let hasDup = false;
                modalInputs.forEach(inp => {
                    if (inp.value.trim()) {
                        const valid = window.validateModalInput(inp, oIdx);
                        if (!valid) hasDup = true;
                    }
                });

                if (hasDup) {
                    Swal.showValidationMessage('⚠️ 存在重複的單號，請修正後再儲存');
                    return false;
                }

                const newPkgCount = parseInt(document.getElementById('swal-pkg-count').value) || 1;
                const newIds = [];

                modalInputs.forEach((inp, idx) => {
                    const codeVal = inp.value.trim();
                    const oldW = (order.ids[idx] && order.ids[idx].w) ? order.ids[idx].w : 0;
                    newIds.push({ code: codeVal, w: oldW });
                });

                return { newPkgCount, newIds };
            }
        }).then((result) => {
            if (result.isConfirmed && result.value) {
                storage[oIdx].packageCount = result.value.newPkgCount;
                storage[oIdx].ids = result.value.newIds;
                saveAndRender();
                showToast("✅ 單號資訊已更新");
            }
        });
    }
</script>
